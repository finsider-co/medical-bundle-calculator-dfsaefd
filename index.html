    const buildFullArray = (sparsePoints) => {
      const arr = [];
      sparsePoints.sort((a, b) => a.age - b.age);
      for (let age = 0; age <= 99; age++) { // 限制只生成 0-99 歲保費，自動刪除 100 歲數據
        const exact = sparsePoints.find(p => p.age === age);
        if (exact) {
          arr.push({age, val: exact.val});
          continue;
        }
        let lower = sparsePoints[0];
        let upper = sparsePoints[sparsePoints.length - 1];
        
        for (let i = 0; i < sparsePoints.length - 1; i++) {
            if (sparsePoints[i].age < age && sparsePoints[i+1].age > age) {
                lower = sparsePoints[i];
                upper = sparsePoints[i+1];
                break;
            }
        }

        if (age <= lower.age) { 
            arr.push({age, val: lower.val}); 
        } else if (age >= upper.age) { 
            arr.push({age, val: upper.val}); 
        } else {
            // 平滑過渡增長
            const ratio = (age - lower.age) / (upper.age - lower.age);
            const val = Math.round(lower.val * Math.pow(upper.val / lower.val, ratio));
            arr.push({age, val});
        }
      }
      return arr;

        setTimeout(() => setParseMessage({ text: "", type: "" }), 3000);
      };

      useEffect(() => {
          if (isEditingData) setJsonText(JSON.stringify(planData, null, 2));
      }, [planData, isEditingData]);

      const saveJsonPlanData = () => {
        try {
          const parsed = JSON.parse(jsonText);
          setPlanData(parsed);
          setJsonError("✅ JSON 更新成功！");
          setTimeout(() => setJsonError(""), 3000);
        } catch (err) {
          setJsonError("JSON 格式錯誤，請檢查您的輸入！ (" + err.message + ")");
        }
      };

      const simulationData = useMemo(() => {
        const i = medicalInflation / 100;
        const startAge = bundleStartAge; 
        
        let clientBasic = 0, clientInflated = 0;
        let hedgedBasic = 0, hedgedInflated = 0;
        const futurePremiums = [];

        for (let age = currentAge; age <= coverageTill; age++) {
          const yearsFromNow = age - currentAge;
          let activePlanId = plan1;
          let activeDed = ded1;
          let activePlanIdB = enablePlan1B ? plan1B : null;
          let activeDedB = enablePlan1B ? ded1B : null;

          if (enableSwitch && age >= switchAge) {
            activePlanId = plan2;
            activeDed = ded2;
            activePlanIdB = enablePlan2B ? plan2B : null;
            activeDedB = enablePlan2B ? ded2B : null;
          }

          let basePremium = getPremium(activePlanId, activeDed, gender, age);
          if (activePlanIdB) {
            basePremium += getPremium(activePlanIdB, activeDedB, gender, age);
          }
          
          const inflatedPremium = basePremium * Math.pow(1 + i, yearsFromNow);
          
          futurePremiums.push({ age, base: basePremium, premium: inflatedPremium });
          
          if (age < startAge) {
            clientBasic += basePremium;
            clientInflated += inflatedPremium;
          } else {
            hedgedBasic += basePremium;
            hedgedInflated += inflatedPremium;
          }
        }

        const smartBlocks = [];
        let currStart = startAge;
        while(currStart <= coverageTill) {
          let currEnd = Math.min(currStart + 9, coverageTill);
          let blockTotal = 0;
          let pStart = 0;
          let pEnd = 0;
          for(let a = currStart; a <= currEnd; a++) {
            const prem = futurePremiums.find(x => x.age === a)?.premium || 0;
            blockTotal += prem;
            if (a === currStart) pStart = prem;
            if (a === currEnd) pEnd = prem;
          }
          let yearsInBlock = currEnd - currStart + 1;
          
          let g = 0;
          if (yearsInBlock > 1 && pStart > 0) {
              g = Math.pow(pEnd / pStart, 1 / (yearsInBlock - 1)) - 1;
          }
          
          let roundedG = Math.round(g * 1000) / 1000; 
          let firstYearW = 0;
          
          // 永久啟用保守模式：確保提取額 ≥ 保費
          let maxRequiredW0 = 0;
          if (roundedG <= 0 || isNaN(roundedG)) roundedG = 0;
          for(let a = currStart; a <= currEnd; a++) {
              const yearInBlock = a - currStart;
              const prem = futurePremiums.find(x => x.age === a)?.premium || 0;
              const requiredW0 = prem / Math.pow(1 + roundedG, yearInBlock);
              if (requiredW0 > maxRequiredW0) maxRequiredW0 = requiredW0;
          }
          firstYearW = maxRequiredW0;
          
          smartBlocks.push({
            startYear: currStart - currentAge + 1,
            endYear: currEnd - currentAge + 1,
            startAge: currStart,
            endAge: currEnd,
            hkd: Math.round(firstYearW),
            usd: Math.round(firstYearW / usdRate),
            incrementRate: roundedG * 100
          });
          currStart = currEnd + 1;
        }

        const chartData = [];
        let totalMedicalWithdrawal_Infographic = 0;
        
        for (let age = currentAge; age <= coverageTill; age++) {
          const p = futurePremiums.find(d => d.age === age)?.premium || 0;
          let dataPoint = { age, '預期醫療保費': Math.round(p) };

          if (age >= startAge) {
             let block = smartBlocks.find(b => age >= b.startAge && age <= b.endAge);
             if (block) {
                 const yearInBlock = age - block.startAge;
                 const currentW = block.hkd * Math.pow(1 + (block.incrementRate / 100), yearInBlock);
                 dataPoint['醫療儲備提取'] = Math.round(currentW);
                 totalMedicalWithdrawal_Infographic += currentW;
             } else {
                 dataPoint['醫療儲備提取'] = 0;
             }
          } else {
             dataPoint['醫療儲備提取'] = 0;
          }
          chartData.push(dataPoint);
        }

        totalMedicalWithdrawal_Infographic = Math.round(totalMedicalWithdrawal_Infographic);

        return {
          chartData,
          smartBlocks,
          clientBasic: Math.round(clientBasic),
          clientInflated: Math.round(clientInflated),
          hedgedBasic: Math.round(hedgedBasic),
          hedgedInflated: Math.round(hedgedInflated),
          totalBasic: Math.round(clientBasic + hedgedBasic),
          totalInflated: Math.round(clientInflated + hedgedInflated),
          totalMedicalWithdrawal_Infographic,
          startAge
        };
      }, [currentAge, coverageTill, bundleStartAge, medicalInflation, plan1, ded1, enablePlan1B, plan1B, ded1B, enableSwitch, switchAge, plan2, ded2, enablePlan2B, plan2B, ded2B, gender, usdRate, planData]);

        return `${name} [${dedText}]`;

                      </div>

                            <h2 className="text-xl font-bold text-[#d4af37] mb-2">SMART 智能運算完成</h2>
                            <div className="space-y-3 text-[#a8b8d0] text-left mt-4">
                              <div className="flex items-start gap-3">
                                <div className="mt-1 bg-[#d4af37]/20 p-1 rounded-full shrink-0 shadow-inner border border-[#d4af37]/30">
                                  <svg xmlns="http://www.w3.org/2000/svg" className="w-3 h-3 text-[#d4af37]" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                                </div>
                                <p className="text-sm leading-relaxed">系統已自動將保費分為 <b className="text-[#f3e5ab]">10年一組</b>。</p>
                              </div>
                              <div className="flex items-start gap-3">
                                <div className="mt-1 bg-[#d4af37]/20 p-1 rounded-full shrink-0 shadow-inner border border-[#d4af37]/30">
                                  <svg xmlns="http://www.w3.org/2000/svg" className="w-3 h-3 text-[#d4af37]" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>

                              <div className="flex items-start gap-3">
                                <div className="mt-1 bg-[#d4af37]/20 p-1 rounded-full shrink-0 shadow-inner border border-[#d4af37]/30">
                                  <svg xmlns="http://www.w3.org/2000/svg" className="w-3 h-3 text-[#d4af37]" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                                </div>
                                <p className="text-sm leading-relaxed">首年提取額與遞增率可完美覆蓋該區塊的通脹醫療開支。</p>
                              </div>
                              <div className="bg-gradient-to-br from-[#1a1f2b] to-[#0f141e] p-4 rounded-xl border border-[#d4af37]/30 mt-6 text-center shadow-lg relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-[#d4af37]/50 to-transparent"></div>
                                <p className="text-[#d4af37] font-black text-xs tracking-widest uppercase mb-1.5 flex items-center justify-center gap-1">
                                  <svg xmlns="http://www.w3.org/2000/svg" className="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                                  NEXT STEP
                                </p>
                                <p className="text-xs text-slate-400">請將右方表格數據直接輸入公司的 SMART 系統中，並生成建議書。</p>
                              </div>
                            </div>
                         </div>
                      </div>
                      <div className="col-span-6 bg-[#fdfbf7] rounded-xl border border-[#d4af37]/40 shadow-lg flex flex-col overflow-hidden min-h-0">
                        <div className="bg-[#111] py-3 px-4 border-b border-[#d4af37] flex justify-between items-center shrink-0">
                          <h2 className="text-base font-bold text-[#d4af37] flex items-center gap-2"><Landmark className="w-5 h-5"/> SMART 系統專用提取數據</h2>
                        </div>
                        <div className="flex-1 overflow-y-auto p-2">
                          <table className="w-full text-sm text-center border-collapse">
                            <thead className="bg-[#fdfbf7] sticky top-0 border-b border-[#d4af37]/30 z-10">
                              <tr>
                                <th className="py-2.5 font-bold text-[#8b6508] border-r border-[#d4af37]/20 font-sans">Withdrawal starts<br/><span className="text-[10px] font-normal text-slate-400">(Policy Year)</span></th>
                                <th className="py-2.5 font-bold text-[#8b6508] border-r border-[#d4af37]/20 font-sans">Withdrawal ends<br/><span className="text-[10px] font-normal text-slate-400">(Policy Year)</span></th>

                              </tr>
                            </thead>
                            <tbody>
                              {simulationData.smartBlocks.map((block, idx) => (
                                <tr key={idx} className={`${idx % 2 === 0 ? 'bg-white' : 'bg-[#fdfbf7]'} border-b border-slate-100 hover:bg-[#fff7e6] transition-colors`}>
                                  <td className="py-3 text-slate-700 border-r border-slate-100 text-lg font-bold">{block.startYear}</td>
                                  <td className="py-3 text-slate-700 border-r border-slate-100 text-lg font-bold">{block.endYear}</td>
                                  <td className="py-3 text-slate-400 text-xs border-r border-slate-100">{block.startAge} 歲 ~ {block.endAge} 歲</td>
                                  <td className="py-3 font-extrabold text-[#b8860b] border-r border-slate-100 text-lg">{formatCurrency(block.hkd)}</td>
                                  <td className="py-3 font-extrabold text-[#b8860b] border-r border-slate-100 text-lg">{formatCurrency(block.usd)}</td>
                                  <td className="py-3 font-extrabold text-[#8b6508] text-lg">{block.incrementRate.toFixed(1)}%</td>
                                </tr>
                              ))}
                            </tbody>
                          </table>
                        </div>
                      </div>
                    </React.Fragment>
                  )}

                  {/* --- 階段 3: 儲蓄建議書配對 --- */}
                  {currentStep === 3 && (
                    <React.Fragment>
                      <div className="col-span-4 bg-[#0f141e] rounded-xl p-6 border border-[#d4af37]/40 shadow-lg flex flex-col h-full">
                         <h2 className="text-xl font-bold text-[#d4af37] mb-5 border-b border-[#d4af37]/30 pb-3 flex items-center gap-2"><FileText className="w-5 h-5"/> 儲蓄保險建議書數據</h2>
                         <p className="text-[#a8b8d0] text-sm mb-6">請輸入您剛才在系統跑出的建議書最終數據 (美元)。</p>
                         <div className="space-y-4 flex-1 overflow-y-auto pr-2">
                           <div className="flex justify-between items-center text-sm">
                               <span className="text-slate-300">儲蓄計劃名稱</span>
                               <input type="text" value={savingsPlanName} onChange={e => setSavingsPlanName(e.target.value)} className="w-40 bg-[#1a1f2b] text-white font-bold rounded px-3 py-1.5 border border-[#d4af37]/40 outline-none text-right focus:border-[#d4af37]" />
                           </div>
                           <div className="flex justify-between items-center text-sm">
                               <span className="text-slate-300">供款年期 (年)</span>
                               <input type="number" value={premiumTerm} onChange={e => setPremiumTerm(Number(e.target.value))} className="w-40 bg-[#1a1f2b] text-white font-bold rounded pl-3 py-1.5 border border-[#d4af37]/40 outline-none text-right focus:border-[#d4af37]" />
                           </div>
                           <div className="flex justify-between items-center text-sm">
                               <span className="text-slate-300">每年保費 (USD)</span>
                               <input type="number" value={annualPremiumUSD} onChange={e => setAnnualPremiumUSD(Number(e.target.value))} className="w-40 bg-[#1a1f2b] text-white font-bold rounded pl-3 py-1.5 border border-[#d4af37]/40 outline-none text-right focus:border-[#d4af37]" />
                           </div>
                           <div className="flex justify-between items-center text-sm">
                               <span className="text-slate-300">首年保費折扣 (%)</span>
                               <input type="number" step="0.1" value={promoDiscount1Pct} onChange={e => setPromoDiscount1Pct(Number(e.target.value))} className="w-40 bg-[#1a1f2b] text-white font-bold rounded pl-3 py-1.5 border border-[#d4af37]/40 outline-none text-right focus:border-[#d4af37]" />
                           </div>
                           <div className="flex justify-between items-center text-sm">
                               <span className="text-slate-300">次年/額外折扣 (%)</span>
                               <input type="number" step="0.1" value={promoDiscount2Pct} onChange={e => setPromoDiscount2Pct(Number(e.target.value))} className="w-40 bg-[#1a1f2b] text-white font-bold rounded pl-3 py-1.5 border border-[#d4af37]/40 outline-none text-right focus:border-[#d4af37]" />
                           </div>
                           <div className="flex justify-between items-center text-sm">
                               <span className="text-slate-300">期滿預期價值 (USD)</span>
                               <input type="number" value={projectedValueUSD} onChange={e => setProjectedValueUSD(Number(e.target.value))} className="w-40 bg-[#1a1f2b] text-white font-bold rounded pl-3 py-1.5 border border-[#d4af37]/40 outline-none text-right focus:border-[#d4af37]" />
                           </div>
                           <div className="flex justify-between items-center text-sm pt-4 border-t border-[#d4af37]/30 mt-2">
                               <span className="text-[#f3e5ab] font-bold">轉換匯率 (USD兌HKD)</span>
                               <input type="number" step="0.01" value={savingsExchangeRate} onChange={e => setSavingsExchangeRate(Number(e.target.value))} className="w-40 bg-[#d4af37]/20 text-[#f3e5ab] font-bold rounded pl-3 py-1.5 border border-[#d4af37] outline-none text-right focus:ring-1 focus:ring-[#d4af37]" />
                           </div>
                         </div>
                      </div>
                      
                      <div className="col-span-4 flex flex-col gap-5 h-full">
                         <div className="bg-[#1a1f2b] rounded-xl p-6 border border-[#d4af37]/30 flex-1 flex flex-col justify-center shadow-lg">
                             <div className="text-[#d4af37] mb-2 font-bold flex items-center gap-2"><Target className="w-5 h-5"/> 總保費投入 (Net)</div>
                             <div className="text-4xl font-extrabold text-white tracking-wide drop-shadow-sm">
                               ${formatCurrency(((annualPremiumUSD * premiumTerm) - (annualPremiumUSD * promoDiscount1Pct / 100) - (annualPremiumUSD * promoDiscount2Pct / 100)) * savingsExchangeRate)} <span className="text-xl text-[#f3e5ab]">HKD</span>

                             <div className="text-[#a8b8d0] text-xs mt-2">(已扣除折扣並轉換匯率)</div>
                         </div>
                         <div className="bg-[#1a1f2b] rounded-xl p-6 border border-[#d4af37]/30 flex-1 flex flex-col justify-center shadow-lg">
                             <div className="text-[#d4af37] mb-2 font-bold flex items-center gap-2"><HeartPulse className="w-5 h-5"/> 預期醫療總提取 (至 {coverageTill} 歲)</div>
                             <div className="text-4xl font-extrabold text-white tracking-wide drop-shadow-sm">${formatCurrency(simulationData.totalMedicalWithdrawal_Infographic)} <span className="text-xl text-[#f3e5ab]">HKD</span></div>
                             <div className="text-[#a8b8d0] text-xs mt-2">(SMART 系統對應支付保費總額)</div>
                         </div>
                         <div className="bg-[#1a1f2b] rounded-xl p-6 border border-[#d4af37]/30 flex-1 flex flex-col justify-center shadow-lg">
                             <div className="text-[#d4af37] mb-2 font-bold flex items-center gap-2"><PiggyBank className="w-5 h-5"/> 期滿剩餘戶口價值 ({coverageTill} 歲)</div>
                             <div className="text-4xl font-extrabold text-white tracking-wide drop-shadow-sm">${formatCurrency(projectedValueUSD * savingsExchangeRate)} <span className="text-xl text-[#f3e5ab]">HKD</span></div>
                             <div className="text-[#a8b8d0] text-xs mt-2">(已轉換為港幣)</div>

                      </div>

                      <div className="col-span-4 bg-gradient-to-b from-[#1a1f2b] to-[#0f141e] rounded-xl p-8 border border-[#d4af37]/50 shadow-[0_0_30px_rgba(212,175,55,0.1)] flex flex-col items-center justify-center text-center">

                                    <span><span className="text-[#d4af37] font-bold">現時計劃：</span><span className="text-white">{plan1Display}</span></span>

                                {enableSwitch && (
                                    <>
                                        <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4 text-slate-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                                        <div className="bg-[#1a1f2b] text-[#a8b8d0] px-3 py-2 rounded-lg border border-[#d4af37]/20 flex items-center gap-2 shadow-inner">
                                            <span><span className="text-[#d4af37] font-bold">{switchAge}歲轉換為：</span><span className="text-white">{plan2Display}</span></span>
                                        </div>
                                    </>
                                )}
                            </div>
                        </div>
                        <div className="flex gap-4 shrink-0">
                            <div className="bg-[#1a1f2b] border border-[#d4af37]/30 px-4 py-2 rounded-xl flex flex-col items-center justify-center shadow-inner">
                                <span className="text-xs text-[#a8b8d0] mb-1">醫療通脹預設</span>
                                <span className="text-lg font-bold text-[#E6C280]">{medicalInflation}%</span>
                            </div>
                            <div className="bg-[#1a1f2b] border border-[#d4af37]/30 px-4 py-2 rounded-xl flex flex-col items-center justify-center shadow-inner">
                                <span className="text-xs text-[#a8b8d0] mb-1">融資啟動年齡</span>
                                <span className="text-lg font-bold text-[#E6C280]">{bundleStartAge} 歲</span>
                            </div>
                        </div>
                    </div>
    
                    <div className="flex-1 w-full bg-[#0a0d14] rounded-2xl border border-white/5 p-6 shadow-inner relative">
                        <ResponsiveContainer width="100%" height="100%">
                            <ComposedChart data={simulationData.chartData} margin={{ top: 20, right: 30, left: 20, bottom: 10 }}>
                                <defs>
                                    <linearGradient id="colorPremium" x1="0" y1="0" x2="0" y2="1">
                                        <stop offset="5%" stopColor="#d4af37" stopOpacity={0.3}/>
                                        <stop offset="95%" stopColor="#d4af37" stopOpacity={0}/>
                                    </linearGradient>
                                    <linearGradient id="colorWithdrawal" x1="0" y1="0" x2="0" y2="1">
                                        <stop offset="5%" stopColor="#10B981" stopOpacity={0.8}/>
                                        <stop offset="95%" stopColor="#10B981" stopOpacity={0.2}/>
                                    </linearGradient>
                                </defs>
                                <CartesianGrid strokeDasharray="3 3" stroke="#1E293B" vertical={false} />
                                <XAxis 
                                    dataKey="age" 
                                    stroke="#a8b8d0" 
                                    tick={{ fill: '#a8b8d0', fontSize: 14 }} 
                                    tickMargin={10}
                                    minTickGap={20}
                                />
                                <YAxis 
                                    yAxisId="left" 
                                    stroke="#a8b8d0" 
                                    tickFormatter={(val) => `$${formatCurrency(val)}`} 
                                    tick={{ fontSize: 14 }} 
                                    width={100} 
                                />
                                <Tooltip 
                                    contentStyle={{ backgroundColor: '#1a1f2b', borderColor: '#d4af37', color: '#f3e5ab', borderRadius: '12px', padding: '12px' }} 
                                    formatter={(value, name) => [formatCurrency(value), name === '預期醫療保費' ? '預期醫療保費 (計通脹)' : '醫療儲備提取']} 
                                    labelFormatter={(label) => `實際年齡: ${label}歲`} 
                                    itemStyle={{ fontSize: '14px', marginTop: '4px' }}
                                />
                                <Legend 
                                    verticalAlign="top" 
                                    height={40} 
                                    wrapperStyle={{ color: '#d4af37', fontSize: 14, fontWeight: 'bold' }}
                                />
                                
                                {enableSwitch && switchAge >= currentAge && switchAge <= coverageTill && (
                                    <ReferenceLine x={switchAge} stroke="#f3e5ab" strokeDasharray="5 5" yAxisId="left" label={{ position: 'insideTopLeft', value: '轉換計劃', fill: '#f3e5ab', fontSize: 14, offset: 15 }} />
                                )}
                                <ReferenceLine x={bundleStartAge} stroke="#E6C280" strokeDasharray="3 3" yAxisId="left" label={{ position: 'insideTopLeft', value: '啟動提取', fill: '#E6C280', fontSize: 14, offset: 15 }} />
                                
                                <Area 
                                    type="monotone" 
                                    dataKey="預期醫療保費" 
                                    fill="url(#colorPremium)" 
                                    stroke="#d4af37" 
                                    strokeWidth={4} 
                                    yAxisId="left" 
                                    name="預期醫療保費" 
                                    activeDot={{ r: 6, fill: '#E6C280', stroke: '#fff', strokeWidth: 2 }}
                                />
                                <Bar 
                                    dataKey="醫療儲備提取" 
                                    fill="url(#colorWithdrawal)" 
                                    yAxisId="left" 
                                    name="醫療儲備提取" 
                                    barSize={12}
                                    radius={[4, 4, 0, 0]}
                                />
                            </ComposedChart>
                        </ResponsiveContainer>
                    </div>
                </div>
              </div>
            )}

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

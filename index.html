          25000: [ {age: 0, val: 4422}, {age: 4, val: 4422}, {age: 5, val: 4351}, {age: 19, val: 4351}, {age: 30, val: 5506}, {age: 40, val: 6649}, {age: 50, val: 9485}, {age: 60, val: 15905}, {age: 70, val: 29471}, {age: 80, val: 52569}, {age: 100, val: 75476} ], 
          50000: [ {age: 0, val: 2872}, {age: 4, val: 2872}, {age: 5, val: 2770}, {age: 19, val: 2770}, {age: 30, val: 3368}, {age: 40, val: 4001}, {age: 50, val: 6874}, {age: 60, val: 10590}, {age: 70, val: 24633}, {age: 80, val: 40326}, {age: 100, val: 69060} ], 
          100000: [ {age: 0, val: 2698}, {age: 4, val: 2698}, {age: 5, val: 2458}, {age: 19, val: 2458}, {age: 30, val: 2932}, {age: 40, val: 3482}, {age: 50, val: 5599}, {age: 60, val: 8481}, {age: 70, val: 19086}, {age: 80, val: 31248}, {age: 100, val: 53512} ], 
          180000: [ {age: 0, val: 2438}, {age: 4, val: 2438}, {age: 5, val: 2220}, {age: 19, val: 2220}, {age: 30, val: 2638}, {age: 40, val: 3122}, {age: 50, val: 5039}, {age: 60, val: 7632}, {age: 70, val: 17177}, {age: 80, val: 28123}, {age: 100, val: 48160} ] 
        } 
      }
    };

    // 指數平滑演算法
    const buildFullArray = (sparsePoints) => {
      const arr = [];
      sparsePoints.sort((a, b) => a.age - b.age);
      for (let age = 0; age <= 100; age++) {
        const exact = sparsePoints.find(p => p.age === age);
        if (exact) {
          arr.push({age, val: exact.val});
          continue;
        }
        let lower = sparsePoints[0];
        let upper = sparsePoints[sparsePoints.length - 1];
        
        for (let i = 0; i < sparsePoints.length - 1; i++) {
            if (sparsePoints[i].age < age && sparsePoints[i+1].age > age) {
                lower = sparsePoints[i];
                upper = sparsePoints[i+1];
                break;
            }
        }

        if (age <= lower.age) { 
            arr.push({age, val: lower.val}); 
        } else if (age >= upper.age) { 
            arr.push({age, val: upper.val}); 
        } else {
            // 平滑過渡增長
            const ratio = (age - lower.age) / (upper.age - lower.age);
            const val = Math.round(lower.val * Math.pow(upper.val / lower.val, ratio));
            arr.push({age, val});
        }
      }
      return arr;
    };

    const GENERATED_PLAN_DATA = {};
    for (let planKey in RAW_PLAN_DATA) {
        GENERATED_PLAN_DATA[planKey] = { ...RAW_PLAN_DATA[planKey], rates: {} };
        for (let rateKey in RAW_PLAN_DATA[planKey].rates) {
            GENERATED_PLAN_DATA[planKey].rates[rateKey] = buildFullArray(RAW_PLAN_DATA[planKey].rates[rateKey]);
        }
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(1);
      
      // 動態數據庫 State
      const [planData, setPlanData] = useState(GENERATED_PLAN_DATA);
      const [isEditingData, setIsEditingData] = useState(false);
      const [editorMode, setEditorMode] = useState('excel'); 
      
      const [editPlanId, setEditPlanId] = useState('vPrime');
      const [editRateKey, setEditRateKey] = useState('0');
      const [excelText, setExcelText] = useState("");
      const [parseMessage, setParseMessage] = useState({ text: "", type: "" });
      const [jsonText, setJsonText] = useState("");
      const [jsonError, setJsonError] = useState("");

      const getPremium = (planId, deductible, gender, age) => {
        const plan = planData[planId];
        if (!plan) return 0;
        const rateKey = plan.genderSpecific ? `${gender}_${deductible}` : `${deductible}`;
        const rates = plan.rates[rateKey] || plan.rates[Object.keys(plan.rates)[0]]; 
        const pt = rates.find(r => r.age === age);
        return pt ? pt.val : 0;
      };

      // --- 階段 1 & 2 核心參數 ---
      const [currentAge, setCurrentAge] = useState(28); 
      const [gender, setGender] = useState('M');
      const [coverageTill, setCoverageTill] = useState(90); 
      const [bundleStartAge, setBundleStartAge] = useState(62);
      const [usdRate, setUsdRate] = useState(7.8);
      const [medicalInflation, setMedicalInflation] = useState(3.0);
      
      const [plan1, setPlan1] = useState('vPrime');
      const [ded1, setDed1] = useState(0);
      const [enablePlan1B, setEnablePlan1B] = useState(false);
      const [plan1B, setPlan1B] = useState('vFamily');
      const [ded1B, setDed1B] = useState(0);

      const [enableSwitch, setEnableSwitch] = useState(true);
      const [switchAge, setSwitchAge] = useState(65);
      const [plan2, setPlan2] = useState('vPrime');
      const [ded2, setDed2] = useState(0);
      const [enablePlan2B, setEnablePlan2B] = useState(false);
      const [plan2B, setPlan2B] = useState('vFamily');
      const [ded2B, setDed2B] = useState(0);

      // --- 階段 3 參數 ---
      const [savingsPlanName, setSavingsPlanName] = useState('盈聚天下計劃');
      const [premiumTerm, setPremiumTerm] = useState(5);
      const [annualPremiumUSD, setAnnualPremiumUSD] = useState(16000);
      const [promoDiscount1Pct, setPromoDiscount1Pct] = useState(0); 
      const [promoDiscount2Pct, setPromoDiscount2Pct] = useState(0);  
      const [projectedValueUSD, setProjectedValueUSD] = useState(203307);
      const [savingsExchangeRate, setSavingsExchangeRate] = useState(7.8);

      const handlePlanChange = (e, setPlan, setDed) => {
        const p = e.target.value;
        setPlan(p);
        setDed(planData[p].deductibles[0]);
      };

      const openDataEditor = () => {
        setJsonText(JSON.stringify(planData, null, 2));
        setParseMessage({ text: "", type: "" });
        setJsonError("");
        setEditPlanId('vPrime');
        setEditRateKey('0');
        updateExcelText('vPrime', '0', planData);
        setIsEditingData(true);
      };

      const updateExcelText = (pid, rk, data = planData) => {
        const rates = data[pid]?.rates[rk] || [];
        setExcelText(rates.map(r => `${r.age}\t${r.val}`).join('\n'));
      };

      const handleEditPlanChange = (e) => {
        const pid = e.target.value;
        setEditPlanId(pid);
        const firstKey = Object.keys(planData[pid].rates)[0];
        setEditRateKey(firstKey);
        updateExcelText(pid, firstKey, planData);
      };

      const handleEditRateChange = (e) => {
        const rk = e.target.value;
        setEditRateKey(rk);
        updateExcelText(editPlanId, rk, planData);
      };

      const handleApplyExcel = () => {
        const lines = excelText.split('\n');
        const newRates = [];
        for(let i=0; i<lines.length; i++) {
            const line = lines[i].trim();
            if(!line) continue;
            const parts = line.split(/\t+/);
            let age, val;
            if (parts.length >= 2) {
                age = parseInt(parts[0].trim());
                val = parseFloat(parts[1].trim().replace(/,/g, '')); 
            } else {
                const spaceParts = line.split(/\s+/);
                if (spaceParts.length >= 2) {
                    age = parseInt(spaceParts[0].trim());
                    val = parseFloat(spaceParts[spaceParts.length-1].trim().replace(/,/g, ''));
                }
            }

            if (age !== undefined && val !== undefined && !isNaN(age) && !isNaN(val)) {
                newRates.push({age, val});
            }
        }
        
        if (newRates.length === 0) {
            setParseMessage({ text: "錯誤：未能解析出有效數據。請確保格式為「年齡[Tab]保費」。", type: "error" });
            return;
        }
        
        const fullArray = buildFullArray(newRates.sort((a,b) => a.age - b.age));
        
        setPlanData(prev => ({
            ...prev,
            [editPlanId]: {
                ...prev[editPlanId],
                rates: {
                    ...prev[editPlanId].rates,
                    [editRateKey]: fullArray
                }
            }
        }));
        setParseMessage({ text: `✅ 成功精確更新 ${planData[editPlanId].name} (${editRateKey}) 的完整數據！`, type: "success" });
        setTimeout(() => setParseMessage({ text: "", type: "" }), 3000);
      };

      useEffect(() => {
          if (isEditingData) setJsonText(JSON.stringify(planData, null, 2));
      }, [planData, isEditingData]);

      const saveJsonPlanData = () => {
        try {
          const parsed = JSON.parse(jsonText);
          setPlanData(parsed);
          setJsonError("✅ JSON 更新成功！");
          setTimeout(() => setJsonError(""), 3000);
        } catch (err) {
          setJsonError("JSON 格式錯誤，請檢查您的輸入！ (" + err.message + ")");
        }
      };

      const simulationData = useMemo(() => {
        const i = medicalInflation / 100;
        const startAge = bundleStartAge; 
        
        let clientBasic = 0, clientInflated = 0;
        let hedgedBasic = 0, hedgedInflated = 0;
        const futurePremiums = [];

        for (let age = currentAge; age <= coverageTill; age++) {
          const yearsFromNow = age - currentAge;
          let activePlanId = plan1;
          let activeDed = ded1;
          let activePlanIdB = enablePlan1B ? plan1B : null;
          let activeDedB = enablePlan1B ? ded1B : null;

          if (enableSwitch && age >= switchAge) {
            activePlanId = plan2;
            activeDed = ded2;
            activePlanIdB = enablePlan2B ? plan2B : null;
            activeDedB = enablePlan2B ? ded2B : null;
          }

          let basePremium = getPremium(activePlanId, activeDed, gender, age);
          if (activePlanIdB) {
            basePremium += getPremium(activePlanIdB, activeDedB, gender, age);
          }
          
          const inflatedPremium = basePremium * Math.pow(1 + i, yearsFromNow);
          
          futurePremiums.push({ age, base: basePremium, premium: inflatedPremium });
          
          if (age < startAge) {
            clientBasic += basePremium;
            clientInflated += inflatedPremium;
          } else {
            hedgedBasic += basePremium;
            hedgedInflated += inflatedPremium;
          }
        }

        const smartBlocks = [];
        let currStart = startAge;
        while(currStart <= coverageTill) {
          let currEnd = Math.min(currStart + 9, coverageTill);
          let blockTotal = 0;
          let pStart = 0;
          let pEnd = 0;
          for(let a = currStart; a <= currEnd; a++) {
            const prem = futurePremiums.find(x => x.age === a)?.premium || 0;
            blockTotal += prem;
            if (a === currStart) pStart = prem;
            if (a === currEnd) pEnd = prem;
          }
          let yearsInBlock = currEnd - currStart + 1;
          
          let g = 0;
          if (yearsInBlock > 1 && pStart > 0) {
              g = Math.pow(pEnd / pStart, 1 / (yearsInBlock - 1)) - 1;
          }
          
          let roundedG = Math.round(g * 1000) / 1000; 
          let firstYearW = 0;
          if (roundedG <= 0 || isNaN(roundedG)) {
              firstYearW = blockTotal / yearsInBlock;
              roundedG = 0;
          } else {
              firstYearW = blockTotal * roundedG / (Math.pow(1 + roundedG, yearsInBlock) - 1);
          }
          
          smartBlocks.push({
            startYear: currStart - currentAge + 1,
            endYear: currEnd - currentAge + 1,
            startAge: currStart,
            endAge: currEnd,
            hkd: Math.round(firstYearW),
            usd: Math.round(firstYearW / usdRate),
            incrementRate: roundedG * 100
          });
          currStart = currEnd + 1;
        }

        const chartData = [];
        for (let age = currentAge; age <= coverageTill; age++) {
          const p = futurePremiums.find(d => d.age === age)?.premium || 0;
          let dataPoint = { age, '預期醫療保費': Math.round(p) };

          if (age >= startAge) {
             let block = smartBlocks.find(b => age >= b.startAge && age <= b.endAge);
             if (block) {
                 const yearInBlock = age - block.startAge;
                 const currentW = block.hkd * Math.pow(1 + (block.incrementRate / 100), yearInBlock);
                 dataPoint['醫療儲備提取'] = Math.round(currentW);
             } else {
                 dataPoint['醫療儲備提取'] = 0;
             }
          } else {
             dataPoint['醫療儲備提取'] = 0;
          }
          chartData.push(dataPoint);
        }

        const totalMedicalWithdrawal_Infographic = Math.round(hedgedInflated);

        return {
          chartData,
          smartBlocks,
          clientBasic: Math.round(clientBasic),
          clientInflated: Math.round(clientInflated),
          hedgedBasic: Math.round(hedgedBasic),
          hedgedInflated: Math.round(hedgedInflated),
          totalBasic: Math.round(clientBasic + hedgedBasic),
          totalInflated: Math.round(clientInflated + hedgedInflated),
          totalMedicalWithdrawal_Infographic,
          startAge
        };
      }, [currentAge, coverageTill, bundleStartAge, medicalInflation, plan1, ded1, enablePlan1B, plan1B, ded1B, enableSwitch, switchAge, plan2, ded2, enablePlan2B, plan2B, ded2B, gender, usdRate, planData]);

      const formatCurrency = (val) => new Intl.NumberFormat('en-US', { maximumFractionDigits: 0 }).format(val);

      const renderComparisonChart = () => {
          return (
            <div className="w-full h-full flex flex-col relative px-6 pb-4">

                      ← 返回修改
                  </button>
              </div>
              
              <div className="flex-1 w-full bg-gradient-to-b from-[#0f141e] to-[#0a0d14] relative flex flex-col font-sans border-2 border-[#d4af37]/30 shadow-2xl overflow-hidden rounded-2xl animate-in fade-in duration-500 p-8">
                  
                  <div className="flex justify-between items-center mb-6 shrink-0">
                      <div>
                          <h1 className="text-3xl lg:text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-[#E6C280] to-[#D4AF37] tracking-wide">
                              終身醫療保費 vs 醫療儲備提取展示
                          </h1>
                          <p className="text-[#a8b8d0] mt-2 font-bold tracking-wide">
                              視覺化驗證：每一年的提取金額是否能完美覆蓋當年的通脹醫療保費
                          </p>
                      </div>
                      <div className="flex gap-4">
                          <div className="bg-[#1a1f2b] border border-[#d4af37]/30 px-4 py-2 rounded-xl flex flex-col items-center justify-center">
                              <span className="text-xs text-[#a8b8d0] mb-1">醫療通脹預設</span>

                          </div>
                          <div className="bg-[#1a1f2b] border border-[#d4af37]/30 px-4 py-2 rounded-xl flex flex-col items-center justify-center">
                              <span className="text-xs text-[#a8b8d0] mb-1">融資啟動年齡</span>

                          </div>

                              <YAxis

                              <Bar

                                  radius={[4, 4, 0, 0]}
                              />
                          </ComposedChart>
                      </ResponsiveContainer>
                  </div>
              </div>
            </div>
          );
      };

      const renderInfographic = () => {
        const { startAge, totalMedicalWithdrawal_Infographic } = simulationData;
        const withdrawalYears = coverageTill - startAge + 1;
        const baseYear = new Date().getFullYear();
        const endYear = baseYear + (coverageTill - currentAge);
        
        const annualPremiumHKD = annualPremiumUSD * savingsExchangeRate;
        const discount1USD = annualPremiumUSD * (promoDiscount1Pct / 100);
        const discount2USD = annualPremiumUSD * (promoDiscount2Pct / 100);
        const totalDiscountUSD = discount1USD + discount2USD;
        
        const totalDiscountHKD = totalDiscountUSD * savingsExchangeRate;
        const projectedValueHKD = projectedValueUSD * savingsExchangeRate;
        
        const netPremiumPaidUSD = (annualPremiumUSD * premiumTerm) - totalDiscountUSD;
        const netPremiumPaidHKD = netPremiumPaidUSD * savingsExchangeRate;
        const totalReturnConverted = totalMedicalWithdrawal_Infographic + projectedValueHKD;
        const leverageMultiplier = netPremiumPaidHKD > 0 ? (totalReturnConverted / netPremiumPaidHKD).toFixed(1) : 0;
        
        const savingsPercentage = totalMedicalWithdrawal_Infographic > 0 && totalMedicalWithdrawal_Infographic > netPremiumPaidHKD
            ? (((totalMedicalWithdrawal_Infographic - netPremiumPaidHKD) / totalMedicalWithdrawal_Infographic) * 100).toFixed(0)

        return (
          <div className="w-full h-full flex flex-col relative px-6 pb-4">

                    ← 返回修改
                </button>
            </div>

            <div className="flex-1 w-full bg-[#fdfbf7] relative flex flex-col font-sans border-2 border-[#d4af37]/30 shadow-2xl overflow-hidden rounded-2xl animate-in fade-in duration-500">

                <div className="h-4 bg-gradient-to-r from-[#111] via-[#d4af37] to-[#111] w-full shrink-0"></div>

                <div className="flex flex-col items-center justify-center pt-8 pb-4 shrink-0">
                   <div className="bg-gradient-to-r from-[#d4af37] via-[#f3e5ab] to-[#d4af37] text-[#111] px-6 py-1.5 rounded-full font-bold text-sm mb-4 shadow-sm uppercase tracking-widest border border-[#d4af37]/50">
                     醫療保費通脹預設: {medicalInflation}% | 貨幣單位: HKD
                   </div>
                   <h1 className="text-4xl lg:text-5xl font-extrabold text-[#111] tracking-wide text-center">

                <div className="w-[90%] max-w-6xl mx-auto bg-gradient-to-r from-[#0f141e] via-[#1a2233] to-[#0f141e] border border-[#d4af37]/40 rounded-3xl p-5 shrink-0 flex items-center justify-between shadow-2xl relative overflow-hidden mt-3">

                        <span className="text-4xl font-black text-white drop-shadow-sm">${formatCurrency(netPremiumPaidHKD)}</span>
                    </div>
                    
                    <div className="flex flex-col items-center justify-center shrink-0 px-4">
                        <span className="bg-[#111] text-[#d4af37] font-black text-xl px-4 py-2 rounded-full border border-[#d4af37]/50 shadow-[0_0_15px_rgba(212,175,55,0.2)]">VS</span>

                    <div className="flex flex-col items-center justify-center flex-1 pr-4">
                        <span className="text-[#d4af37] font-bold text-sm mb-1 uppercase tracking-widest opacity-80">預期總回報 (醫療提取 + 傳承)</span>

                           <div className="flex justify-between items-center text-sm">
                               <span className="text-slate-300">期滿預期價值 (USD)</span>
                               <input type="number" value={projectedValueUSD} onChange={e => setProjectedValueUSD(Number(e.target.value))} className="w-40 bg-[#1a1f2b] text-white font-bold rounded pl-3 py-1.5 border border-[#d4af37]/40 outline-none text-right focus:border-[#d4af37]" />
                           </div>
                           <div className="flex justify-between items-center text-sm pt-4 border-t border-[#d4af37]/30 mt-2">
                               <span className="text-[#f3e5ab] font-bold">轉換匯率 (USD兌HKD)</span>
                               <input type="number" step="0.01" value={savingsExchangeRate} onChange={e => setSavingsExchangeRate(Number(e.target.value))} className="w-40 bg-[#d4af37]/20 text-[#f3e5ab] font-bold rounded pl-3 py-1.5 border border-[#d4af37] outline-none text-right focus:ring-1 focus:ring-[#d4af37]" />
                           </div>
                         </div>
                      </div>
                      
                      <div className="col-span-4 flex flex-col gap-5 h-full">
                         <div className="bg-[#1a1f2b] rounded-xl p-6 border border-[#d4af37]/30 flex-1 flex flex-col justify-center shadow-lg">
                             <div className="text-[#d4af37] mb-2 font-bold flex items-center gap-2"><Target className="w-5 h-5"/> 總保費投入 (Net)</div>
                             <div className="text-4xl font-extrabold text-white tracking-wide drop-shadow-sm">
                               ${formatCurrency(((annualPremiumUSD * premiumTerm) - (annualPremiumUSD * promoDiscount1Pct / 100) - (annualPremiumUSD * promoDiscount2Pct / 100)) * savingsExchangeRate)} <span className="text-xl text-[#f3e5ab]">HKD</span>
                             </div>
                             <div className="text-[#a8b8d0] text-xs mt-2">(已扣除折扣並轉換匯率)</div>
                         </div>
                         <div className="bg-[#1a1f2b] rounded-xl p-6 border border-[#d4af37]/30 flex-1 flex flex-col justify-center shadow-lg">
                             <div className="text-[#d4af37] mb-2 font-bold flex items-center gap-2"><HeartPulse className="w-5 h-5"/> 預期醫療總提取 (至 {coverageTill} 歲)</div>
                             <div className="text-4xl font-extrabold text-white tracking-wide drop-shadow-sm">${formatCurrency(simulationData.totalMedicalWithdrawal_Infographic)} <span className="text-xl text-[#f3e5ab]">HKD</span></div>
                             <div className="text-[#a8b8d0] text-xs mt-2">(SMART 系統對應支付保費總額)</div>
                         </div>
                         <div className="bg-[#1a1f2b] rounded-xl p-6 border border-[#d4af37]/30 flex-1 flex flex-col justify-center shadow-lg">
                             <div className="text-[#d4af37] mb-2 font-bold flex items-center gap-2"><PiggyBank className="w-5 h-5"/> 期滿剩餘戶口價值 ({coverageTill} 歲)</div>
                             <div className="text-4xl font-extrabold text-white tracking-wide drop-shadow-sm">${formatCurrency(projectedValueUSD * savingsExchangeRate)} <span className="text-xl text-[#f3e5ab]">HKD</span></div>
                             <div className="text-[#a8b8d0] text-xs mt-2">(已轉換為港幣)</div>
                         </div>
                      </div>

                      <div className="col-span-4 bg-gradient-to-b from-[#1a1f2b] to-[#0f141e] rounded-xl p-8 border border-[#d4af37]/50 shadow-[0_0_30px_rgba(212,175,55,0.1)] flex flex-col items-center justify-center text-center">
                           <Presentation className="w-24 h-24 text-[#d4af37] mb-6 drop-shadow-lg opacity-90" />
                           <h2 className="text-3xl font-extrabold text-white mb-4 tracking-wide text-gradient-gold">數據已準備就緒</h2>
                           <p className="text-[#a8b8d0] mb-10 text-lg leading-relaxed">
                               我們已經為您整合了所有醫療保費及儲蓄建議書數據。<br/>點擊下方按鈕，立即生成您的專屬高清醫療融資展示圖表！
                           </p>
                           <button onClick={() => setCurrentStep(4)} className="bg-gradient-to-r from-[#E6C280] via-[#D4AF37] to-[#AA8222] text-[#111] px-10 py-4 rounded-xl font-black text-2xl shadow-[0_0_30px_rgba(212,175,55,0.3)] hover:scale-105 transition-all duration-300 border border-[#FFF0C0]">
                               生成尊貴資訊圖表
                           </button>
                      </div>
                    </React.Fragment>
                  )}

                </div>
              </React.Fragment>
            )}

            {/* --- 階段 4: 終極資訊圖表 (全螢幕展示) --- */}
            {currentStep === 4 && renderInfographic()}

            {/* --- 階段 5: 提取對比圖 (全螢幕展示) --- */}
            {currentStep === 5 && (
              <div className="w-full h-full flex flex-col relative px-6 pb-4">
                <div className="w-full flex justify-start pb-2 shrink-0 pt-2">
                    <button onClick={() => setCurrentStep(3)} className="text-slate-400 hover:text-white font-bold transition-all text-sm flex items-center gap-2 px-3 py-1.5 rounded-lg bg-[#1a1f2b] border border-[#d4af37]/30 hover:border-[#d4af37]">
                        ← 返回修改
                    </button>
                </div>
                
                <div className="flex-1 w-full bg-gradient-to-b from-[#0f141e] to-[#0a0d14] relative flex flex-col font-sans border-2 border-[#d4af37]/30 shadow-2xl overflow-hidden rounded-2xl animate-in fade-in duration-500 p-8">
                    
                    <div className="flex justify-between items-center mb-6 shrink-0">
                        <div>
                            <h1 className="text-3xl lg:text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-[#E6C280] to-[#D4AF37] tracking-wide">
                                終身醫療保費 vs 醫療儲備提取展示
                            </h1>
                            <p className="text-[#a8b8d0] mt-2 font-bold tracking-wide">
                                視覺化驗證：每一年的提取金額是否能完美覆蓋當年的通脹醫療保費
                            </p>
                        </div>
                        <div className="flex gap-4">
                            <div className="bg-[#1a1f2b] border border-[#d4af37]/30 px-4 py-2 rounded-xl flex flex-col items-center justify-center shadow-inner">
                                <span className="text-xs text-[#a8b8d0] mb-1">醫療通脹預設</span>
                                <span className="text-lg font-bold text-[#E6C280]">{medicalInflation}%</span>
                            </div>
                            <div className="bg-[#1a1f2b] border border-[#d4af37]/30 px-4 py-2 rounded-xl flex flex-col items-center justify-center shadow-inner">
                                <span className="text-xs text-[#a8b8d0] mb-1">融資啟動年齡</span>
                                <span className="text-lg font-bold text-[#E6C280]">{bundleStartAge} 歲</span>
                            </div>
                        </div>
                    </div>
    
                    <div className="flex-1 w-full bg-[#0a0d14] rounded-2xl border border-white/5 p-6 shadow-inner relative">
                        <ResponsiveContainer width="100%" height="100%">
                            <ComposedChart data={simulationData.chartData} margin={{ top: 20, right: 30, left: 20, bottom: 10 }}>
                                <defs>
                                    <linearGradient id="colorPremium" x1="0" y1="0" x2="0" y2="1">
                                        <stop offset="5%" stopColor="#d4af37" stopOpacity={0.3}/>
                                        <stop offset="95%" stopColor="#d4af37" stopOpacity={0}/>
                                    </linearGradient>
                                    <linearGradient id="colorWithdrawal" x1="0" y1="0" x2="0" y2="1">
                                        <stop offset="5%" stopColor="#10B981" stopOpacity={0.8}/>
                                        <stop offset="95%" stopColor="#10B981" stopOpacity={0.2}/>
                                    </linearGradient>
                                </defs>
                                <CartesianGrid strokeDasharray="3 3" stroke="#1E293B" vertical={false} />
                                <XAxis 
                                    dataKey="age" 
                                    stroke="#a8b8d0" 
                                    tick={{ fill: '#a8b8d0', fontSize: 14 }} 
                                    tickMargin={10}
                                    minTickGap={20}
                                />
                                <YAxis 
                                    yAxisId="left" 
                                    stroke="#a8b8d0" 
                                    tickFormatter={(val) => `$${formatCurrency(val)}`} 
                                    tick={{ fontSize: 14 }} 
                                    width={100} 
                                />
                                <Tooltip 
                                    contentStyle={{ backgroundColor: '#1a1f2b', borderColor: '#d4af37', color: '#f3e5ab', borderRadius: '12px', padding: '12px' }} 
                                    formatter={(value, name) => [formatCurrency(value), name === '預期醫療保費' ? '預期醫療保費 (計通脹)' : '醫療儲備提取']} 
                                    labelFormatter={(label) => `實際年齡: ${label}歲`} 
                                    itemStyle={{ fontSize: '14px', marginTop: '4px' }}
                                />
                                <Legend 
                                    verticalAlign="top" 
                                    height={40} 
                                    wrapperStyle={{ color: '#d4af37', fontSize: 14, fontWeight: 'bold' }}
                                />
                                
                                {enableSwitch && switchAge >= currentAge && switchAge <= coverageTill && (
                                    <ReferenceLine x={switchAge} stroke="#f3e5ab" strokeDasharray="5 5" yAxisId="left" label={{ position: 'insideTopLeft', value: '轉換計劃', fill: '#f3e5ab', fontSize: 14, offset: 15 }} />
                                )}
                                <ReferenceLine x={bundleStartAge} stroke="#E6C280" strokeDasharray="3 3" yAxisId="left" label={{ position: 'insideTopLeft', value: '啟動提取', fill: '#E6C280', fontSize: 14, offset: 15 }} />
                                
                                <Area 
                                    type="monotone" 
                                    dataKey="預期醫療保費" 
                                    fill="url(#colorPremium)" 
                                    stroke="#d4af37" 
                                    strokeWidth={4} 
                                    yAxisId="left" 
                                    name="預期醫療保費" 
                                    activeDot={{ r: 6, fill: '#E6C280', stroke: '#fff', strokeWidth: 2 }}
                                />
                                <Bar 
                                    dataKey="醫療儲備提取" 
                                    fill="url(#colorWithdrawal)" 
                                    yAxisId="left" 
                                    name="醫療儲備提取" 
                                    barSize={12}
                                    radius={[4, 4, 0, 0]}
                                />
                            </ComposedChart>
                        </ResponsiveContainer>
                    </div>
                </div>
              </div>
            )}

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
